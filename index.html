<!DOCTYPE html>
<html>
<head>
    <title>Financial Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <h1>Stock Risk & Return Calculator</h1>

    <input type="text" id="ticker" placeholder="Enter stock ticker">
    <button onclick="getData()">Get Data</button>

    <p id="result"></p>

    <script>
        async function getData() {
            const ticker = document.getElementById("ticker").value;
            const apiKey = "ZCbOVBqF61rJ2vZrhbChfoNsOOUOVGsT";

            const url = `https://financialmodelingprep.com/api/v3/profile/${ticker}?apikey=${apiKey}`;

            try {
                const response = await fetch(url);
                const data = await response.json();

                if (data.length === 0) {
                    document.getElementById("result").innerText = "Stock not found";
                    return;
                }

                const stock = data[0];

                document.getElementById("result").innerText =
                    `Company: ${stock.companyName}
Price: $${stock.price}
Beta: ${stock.beta}`;
            } catch (error) {
                document.getElementById("result").innerText = "Error fetching data";
            }
        }
    </script>
</body>
</html>
